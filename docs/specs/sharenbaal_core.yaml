# Lumenfall Sharenbaal Core Spec
# File: docs/specs/sharenbaal_core.yaml
# Version: v1.0
# Scope: Mechanical structure + indices only.
# Lore/interpretation lives in: sharenbaal_lore.md, sharenbaal_reflection.md

meta:
  id: lumenfall_sharenbaal
  version: 1.0
  title: "The Sharenbaal of Lumenfall"
  description: >
    The Sharenbaal is the in‑world codex of Lumenfall. It tracks known regions,
    elements, tone paths, and key metaphysical anchors (Guide, Glitch, Prism),
    and exposes them as structured data for future systems. This file is
    intentionally lean on flavor; it exists so mechanics can reference
    consistent identifiers.
  authors:
    - Nullirae
    - Neotus
  status: canonical_foundation
  notes:
    - "Gameplay systems MUST treat these ids as stable."
    - "New content may extend these structures but should not rename existing keys."

chapters:
  - id: overview
    order: 0
    label: "Overview & Purpose"
  - id: regions
    order: 1
    label: "The Eight Regions"
  - id: classes
    order: 2
    label: "Class Lineages"
  - id: elements
    order: 3
