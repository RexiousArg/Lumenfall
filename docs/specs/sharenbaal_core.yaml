tone_paths:
  path_of_exile:
    label: "Path of Exile"
    summary: "Prefers strange orders, wanders off the intended track, progresses systems unevenly."
  path_of_hoards:
    label: "Path of Hoards"
    summary: "Collects relentlessly, rarely spends, tends toward overflowing inventories and unspent rewards."
  path_of_trials:
    label: "Path of Trials"
    summary: "Seeks difficulty spikes, pushes into content above current power, pursues challenge first."
  path_of_safety:
    label: "Path of Safety"
    summary: "Plays conservatively, banks resources, hesitates to risk rare items or currencies."
  path_of_swiftness:
    label: "Path of Swiftness"
    summary: "Rushes progression, skips optional content, optimizes for speed and immediate gain."
  path_of_depth:
    label: "Path of Depth"
    summary: "Explores thoroughly, revisits areas, tests systems exhaustively before moving on."
  path_of_bargains:
    label: "Path of Bargains"
    summary: "Treats everything as trade value, focuses on exchanges, rerolls, and optimization of yields."
  path_of_flux:
    label: "Path of Flux"
    summary: "Shifts styles often, experiments with builds, alternates between extremes of risk and safety."

world_events:
  blight_event:
    id: "blight_event"
    label: "Blight Event"
    triggers:
      - "prism_used_to_zero_charges"
      - "prism_greed_attempt_second_prism"
    flags:
      locks_fast_travel: true
      forced_instance: true
      persists_until_cleared: true

prism:
  aevums_prism:
    id: "aevums_prism"
    rarity: "Divine"
    visible_in_index_before_owned: false
    max_charges: 5
    requires_mythic_essence_for_recharge: true
    recharge_cost_per_charge_hint: 10
    notes:
      - "Soulbound; cannot be traded."
      - "Interacts with Blight event when abused."

guide:
  id: "the_guide"
  visibility:
    appears_before_blight: false
    requires_blight_experience: true
  paths_to_encounter:
    - "universal"
    - "victory"
    - "loss"
  notes:
    - "Dialogue and analysis logic are out of scope for this file."

catalog_rules:
  sharenbaal_unlock_level:
    min_player_level: 5
  chapter_visibility:
    default_state: "present_but_blank"
    prism_chapter_before_ownership: "obscured_and_vague"
  behavior_flags:
    allow_partial_reveals: true
    requires_player_discovery_for_details: true
    is_persistent_across_characters: true
