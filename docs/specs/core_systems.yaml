  arpg_to_ccg:
    - "Arena rewards currencies used for packs/boxes."
  arpg_to_philosophy:
    - "Blight, death patterns, and choices unlock Sharenbaal chapters."
  ccg_to_philosophy:
    - "High-rarity ownership and Prism usage affect Guide responses."
